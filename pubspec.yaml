name: sukli_pos
description: Offline-first POS app for Philippine SMBs
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: any
  riverpod_annotation: any

  # Local Database
  isar_community: any
  isar_community_flutter_libs: any
  path_provider: any

  # Backend
  supabase_flutter: any

  # Navigation
  go_router: any
  flutter_dotenv: ^5.1.0

  # UI & Animations
  flutter_animate: any
  google_fonts: any
  cached_network_image: any
  flutter_svg: any
  shimmer: any
  lottie: any

  # Charts
  fl_chart: any

  # Printing & Export
  pdf: any
  printing: any
  excel: any
  esc_pos_utils_plus: any
  share_plus: ^7.2.1

  # Utils
  crypto: ^3.0.3
  intl: ^0.20.2
  uuid: any
  shared_preferences: ^2.5.5
  connectivity_plus: any
  permission_handler: any
  image_picker: any
  crop_your_image: any
  equatable: any
  dartz: any
  logger: any
  collection: any
  url_launcher: ^6.3.2
  flutter_image_compress: ^2.4.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  isar_community_generator: any
  riverpod_generator: any
  custom_lint: any
  riverpod_lint: any
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/sukli_logo.png"
